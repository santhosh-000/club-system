<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Boxing | Pro Cam Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --primary-red: #ff3c3c;
            --primary-hover: #e62e2e;
            --dark-bg: #0f0f12;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark-bg); 
            background-image: radial-gradient(circle at top right, #1a1a20, #0f0f12);
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- LOGIN SECTION --- */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--dark-bg); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo-text { font-family: 'Oswald', sans-serif; font-size: 2.5rem; letter-spacing: 1px; text-align: center; margin-bottom: 5px; }
        .logo-text span { color: var(--primary-red); }
        .subtitle { text-align: center; margin-bottom: 35px; color: var(--text-dim); font-size: 0.9rem; }

        .input-group { margin-bottom: 20px; }
        input { 
            width: 100%; padding: 16px 20px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; color: #fff; 
            font-size: 1rem; transition: all 0.3s;
        }
        input:focus { border-color: var(--primary-red); outline: none; background: rgba(0,0,0,0.5); }

        .btn-main { 
            width: 100%; padding: 16px; 
            background: var(--primary-red); 
            color: #fff; border: none; 
            border-radius: 12px; font-weight: 700; 
            font-size: 1rem; cursor: pointer; 
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 8px 15px rgba(255, 60, 60, 0.3);
        }
        .btn-main:active { transform: scale(0.97); }

        /* --- CAMERA INTERFACE --- */
        #camInterface { display: none; flex-direction: column; height: 100%; }
        
        .header { 
            padding: 15px 20px; 
            background: rgba(20, 20, 23, 0.8); 
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .status-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(48, 209, 88, 0.1);
            padding: 6px 12px; border-radius: 20px;
        }
        .status-dot { 
            width: 8px; height: 8px; background: #30d158; border-radius: 50%; 
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(48, 209, 88, 0); }
            100% { box-shadow: 0 0 0 0 rgba(48, 209, 88, 0); }
        }

        .video-container { 
            flex: 1; position: relative; background: #000; 
            display: flex; align-items: center; justify-content: center;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        .footer-controls { 
            padding: 25px; background: var(--dark-bg); 
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            margin-top: -20px; position: relative; z-index: 10;
        }
        .streaming-text { color: var(--primary-red); font-weight: 700; text-align: center; margin-bottom: 5px; font-size: 0.9rem; }
        .info-msg { font-size: 0.8rem; color: var(--text-dim); text-align: center; }

        #canvas { display: none; }

        .btn-logout {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h1 class="logo-text">ELITE<span>BOXING</span></h1>
            <p class="subtitle">Mobile Camera Access</p>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            
            <button class="btn-main" onclick="handleLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="camInterface">
        <div class="header">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span style="font-weight:600; font-size:0.75rem; color:#30d158;">LIVE STREAM</span>
            </div>
            <button onclick="handleLogout()" class="btn-logout">LOGOUT</button>
        </div>

        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="footer-controls">
            <p class="streaming-text">BROADCASTING TO SERVER</p>
            <p class="info-msg">Ensure the back camera is focused on the ring.</p>
        </div>
    </div>

<script>
    const API_URL = "http://" + window.location.hostname + ":5000";
    const socket = io(API_URL);
    let streamInterval = null;

    // Page load aagumbodhu session check pannum
    window.onload = () => {
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        if(isLoggedIn === "true") {
            showCameraInterface();
        }
    };

    async function handleLogin() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        try {
            const res = await fetch(`${API_URL}/login-admin`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();

            if(data.success) {
                localStorage.setItem("isLoggedIn", "true"); // Session save panrom
                showCameraInterface();
            } else {
                alert("Invalid Admin Credentials ❌");
            }
        } catch (e) {
            alert("Connection Error. Backend check pannunga.");
        }
    }

    function showCameraInterface() {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("camInterface").style.display = "flex";
        startMobileCam();
    }

    function handleLogout() {
        localStorage.removeItem("isLoggedIn"); // Session clear panrom
        location.reload();
    }

    async function startMobileCam() {
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const context = canvas.getContext("2d");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            });
            video.srcObject = stream;

            streamInterval = setInterval(() => {
                if (video.paused || video.ended) return;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL("image/jpeg", 0.5);
                socket.emit("video_frame", { image: imageData });
            }, 150); 

        } catch (err) {
            alert("Camera Access Denied: " + err.message);
        }
    }

    window.onbeforeunload = () => {
        if(streamInterval) clearInterval(streamInterval);
    };
</script>
</body>
</html>
